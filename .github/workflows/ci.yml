# AEGIS v6 CI/CD Pipeline
# Comprehensive CI for Node.js backend, React frontend, and Python AI engine
# NOTE: This file lives at the REPO ROOT .github/workflows/ so GitHub Actions discovers it.
# The original copy remains at aegis-v6/.github/workflows/ci.yml for reference.

name: AEGIS CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'aegis-v6/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'aegis-v6/**'
      - '.github/workflows/ci.yml'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend (Node.js/Express)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aegis-v6/server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint --if-present

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: ./aegis-v6/server
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aegis_test
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

      - name: Backend coverage summary
        if: always()
        run: |
          echo '## Backend Test Coverage' >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat coverage/text-summary.txt 2>/dev/null || npx jest --coverage --coverageReporters=text-summary 2>/dev/null || echo 'See coverage/ artifacts'
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend (React/Vite)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aegis-v6/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint --if-present

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: ./aegis-v6/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm test -- --run --coverage

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: ./aegis-v6/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_MAPBOX_TOKEN: pk.placeholder.for.ci

  # ─────────────────────────────────────────────────────────────────────────────
  # AI Engine (Python/FastAPI)
  # ─────────────────────────────────────────────────────────────────────────────
  ai-engine-lint:
    name: AI Engine Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aegis-v6/ai-engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: aegis-v6/ai-engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/ --ignore E501

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports --no-error-summary || true

  ai-engine-test:
    name: AI Engine Tests
    runs-on: ubuntu-latest
    needs: ai-engine-lint
    defaults:
      run:
        working-directory: ./aegis-v6/ai-engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: aegis-v6/ai-engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aegis_test

  # ─────────────────────────────────────────────────────────────────────────────
  # Security Scanning
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — informational scan (all severities)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '0'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          output: trivy-all.txt

      - name: Trivy — blocking scan (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Security scan summary
        if: always()
        run: |
          echo '## Security Scan Results' >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-all.txt ] && [ -s trivy-all.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -200 trivy-all.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo 'No vulnerabilities detected by Trivy.' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit server dependencies (informational)
        id: server-audit
        working-directory: ./aegis-v6/server
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=low 2>&1 | tee /tmp/server-audit.txt || true
        continue-on-error: true

      - name: Audit server dependencies (blocking — high/critical)
        working-directory: ./aegis-v6/server
        run: npm audit --audit-level=high

      - name: Audit client dependencies (informational)
        id: client-audit
        working-directory: ./aegis-v6/client
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=low 2>&1 | tee /tmp/client-audit.txt || true
        continue-on-error: true

      - name: Audit client dependencies (blocking — high/critical)
        working-directory: ./aegis-v6/client
        run: npm audit --audit-level=high

      - name: Dependency audit summary
        if: always()
        run: |
          echo '## Dependency Audit Results' >> $GITHUB_STEP_SUMMARY
          echo '### Server' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/server-audit.txt 2>/dev/null || echo 'No audit output.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '### Client' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/client-audit.txt 2>/dev/null || echo 'No audit output.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Setup Python for pip-audit
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Audit AI engine Python dependencies
        working-directory: ./aegis-v6/ai-engine
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc 2>&1 | tee /tmp/pip-audit.txt || true

      - name: Audit AI engine dependencies (blocking — high/critical)
        working-directory: ./aegis-v6/ai-engine
        run: pip-audit -r requirements.txt --fix --dry-run

      - name: Python audit summary
        if: always()
        run: |
          echo '### AI Engine (pip-audit)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/pip-audit.txt 2>/dev/null || echo 'No pip-audit output.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker Build (on main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, ai-engine-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Server Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-v6/server
          push: false
          tags: aegis-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Client Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-v6/client
          push: false
          tags: aegis-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI Engine Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-v6/ai-engine
          push: false
          tags: aegis-ai-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E Tests (Playwright — on main branch after Docker build)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./aegis-v6/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          E2E_BASE_URL: http://localhost:4173
          E2E_API_URL: http://localhost:3001/api
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: aegis-v6/client/playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Staging (auto on main, after all checks pass)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, e2e-tests, security-scan, dependency-audit]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: vars.REGISTRY_URL != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push images (if registry configured)
        if: vars.REGISTRY_URL != ''
        run: |
          docker buildx build --push \
            -t ${{ vars.REGISTRY_URL }}/aegis-server:${{ github.sha }} \
            -t ${{ vars.REGISTRY_URL }}/aegis-server:staging \
            ./aegis-v6/server
          docker buildx build --push \
            -t ${{ vars.REGISTRY_URL }}/aegis-client:${{ github.sha }} \
            -t ${{ vars.REGISTRY_URL }}/aegis-client:staging \
            ./aegis-v6/client
          docker buildx build --push \
            -t ${{ vars.REGISTRY_URL }}/aegis-ai-engine:${{ github.sha }} \
            -t ${{ vars.REGISTRY_URL }}/aegis-ai-engine:staging \
            ./aegis-v6/ai-engine

      - name: Smoke test staging
        if: vars.STAGING_URL != ''
        run: |
          echo "Waiting for staging deployment to settle..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "${{ vars.STAGING_URL }}/api/health" && echo "ok" || echo "fail")
            if [ "$STATUS" = "ok" ]; then
              echo "Staging health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::warning::Staging health check did not pass within 75s"

      - name: Deploy summary
        run: |
          echo '## Deployment Summary' >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | staging |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Production (manual approval gate)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: vars.REGISTRY_URL != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Promote staging images to production
        if: vars.REGISTRY_URL != ''
        run: |
          docker buildx imagetools create \
            --tag ${{ vars.REGISTRY_URL }}/aegis-server:production \
            --tag ${{ vars.REGISTRY_URL }}/aegis-server:${{ github.sha }} \
            ${{ vars.REGISTRY_URL }}/aegis-server:staging
          docker buildx imagetools create \
            --tag ${{ vars.REGISTRY_URL }}/aegis-client:production \
            --tag ${{ vars.REGISTRY_URL }}/aegis-client:${{ github.sha }} \
            ${{ vars.REGISTRY_URL }}/aegis-client:staging
          docker buildx imagetools create \
            --tag ${{ vars.REGISTRY_URL }}/aegis-ai-engine:production \
            --tag ${{ vars.REGISTRY_URL }}/aegis-ai-engine:${{ github.sha }} \
            ${{ vars.REGISTRY_URL }}/aegis-ai-engine:staging

      - name: Production deploy summary
        run: |
          echo '## Production Deployment' >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **production** |" >> $GITHUB_STEP_SUMMARY
          echo "| Approved by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Final Check (all jobs must pass)
  # ─────────────────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, ai-engine-test, security-scan, dependency-audit, e2e-tests]
    if: always()
    steps:
      - name: CI Passed
        run: |
          echo "All CI checks completed!"
          echo '## CI Pipeline Summary' >> $GITHUB_STEP_SUMMARY
          echo '| Job | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----|--------|' >> $GITHUB_STEP_SUMMARY
          echo '| Backend Tests | ${{ needs.backend-test.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Frontend Build | ${{ needs.frontend-build.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| AI Engine Tests | ${{ needs.ai-engine-test.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| E2E Tests | ${{ needs.e2e-tests.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Security Scan | ${{ needs.security-scan.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Dependency Audit | ${{ needs.dependency-audit.result }} |' >> $GITHUB_STEP_SUMMARY
