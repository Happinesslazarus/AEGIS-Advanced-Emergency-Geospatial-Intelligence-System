# Grafana dashboard provisioning — auto-loads AEGIS dashboards on startup
apiVersion: 1

providers:
  - name: 'AEGIS'
    orgId: 1
    folder: 'AEGIS'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
