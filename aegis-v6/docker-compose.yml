# AEGIS v6.9 — Full Stack Docker Compose
# Services:
#   db        — PostgreSQL 16 with PostGIS + pgvector
#   migration — Runs schema + all migration_*.sql files, then exits
#   server    — Express API on port 3001
#   client    — Nginx serving Vite build on port 80
#   ai        — Python AI engine on port 8000 (optional)
# Usage:
#   docker compose up -d

services:
  # Database — custom image: pgvector/pgvector:pg16 + PostGIS 3
  db:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service"
    ports:
      # Bound to localhost only — prevents direct internet access to PostgreSQL.
      # Mapped to 5433 on host to avoid conflict with any local PostgreSQL instance.
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable must be set}
      POSTGRES_DB: aegis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aegis"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Migration runner (runs once, then exits)
  migration:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable must be set}
      PGDATABASE: aegis
      SEED_DATA: "${SEED_DATA:-true}"
    volumes:
      - ./server/sql:/migrations:ro
    entrypoint: ["bash", "/migrations/run-migrations.sh"]
    restart: "no"

  # Admin seeder (runs once IF env vars are set, then exits)
  seed-admin:
    build: ./server
    depends_on:
      migration:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/aegis
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-System Admin}
    entrypoint: ["sh", "-c", "if [ -n \"$INITIAL_ADMIN_EMAIL\" ] && [ -n \"$INITIAL_ADMIN_PASSWORD\" ]; then npx tsx src/scripts/seedAdmin.ts; else echo '[seed-admin] No INITIAL_ADMIN_EMAIL/PASSWORD — skipping.'; fi"]
    restart: "no"

  # Redis (distributed cache)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    command: ['redis-server', '--maxmemory', '200mb', '--maxmemory-policy', 'allkeys-lru', '--appendonly', 'yes', '--appendfsync', 'everysec']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default
    # Not exposed publicly; accessed by server internally
    # Uncomment for local dev debugging:
    # ports:
    # "127.0.0.1:6379:6379"

  # Backend API
  server:
    build: ./server
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "3001:3001"
    depends_on:
      migration:
        condition: service_completed_successfully
      seed-admin:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/aegis
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_DEFAULT_TTL_SECONDS: ${REDIS_DEFAULT_TTL_SECONDS:-300}
      REDIS_STALE_GRACE_SECONDS: ${REDIS_STALE_GRACE_SECONDS:-600}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable must be set}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET must be set (separate from JWT_SECRET)}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set (16+ chars)}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:?N8N_WEBHOOK_SECRET must be set}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY:?TWO_FACTOR_ENCRYPTION_KEY must be set (64 hex chars)}
      AEGIS_REGION: ${AEGIS_REGION:-scotland}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # AI API keys — required in production
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set}
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY must be set}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set}
      HF_API_KEY: ${HF_API_KEY:?HF_API_KEY must be set}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:?OPENWEATHER_API_KEY must be set}
      # Notification keys (required)
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST must be set}
      SMTP_USER: ${SMTP_USER:?SMTP_USER must be set}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS must be set}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:?TWILIO_ACCOUNT_SID must be set}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:?TWILIO_AUTH_TOKEN must be set}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:?VAPID_PUBLIC_KEY must be set}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:?VAPID_PRIVATE_KEY must be set}
      # Google OAuth (social login) — optional, login with Google disabled if not set
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_CALLBACK_URL: ${OAUTH_CALLBACK_URL:-http://localhost/api/auth/google/callback}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    volumes:
      - uploads:/app/uploads
    networks:
      - default
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Frontend
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service"
    ports:
      - "80:80"
    depends_on:
      - server
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # AI Engine (optional)
  ai:
    build: ./ai-engine
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service"
    ports:
      # Bound to localhost only — the AI engine is an internal service.
      # Only needs to be reachable by the Express server (via Docker network `ai:8000`).
      # External exposure is only needed for local debugging; use
      # docker-compose.override.yml to change for development if needed.
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/aegis
      API_SECRET_KEY: ${API_SECRET_KEY:?API_SECRET_KEY must be set}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENABLE_SENTRY: ${ENABLE_SENTRY:-false}
    networks:
      - default
      - monitoring
    profiles:
      - ai
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Prometheus (metrics scraper)
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.listen-address=0.0.0.0:9090'
    depends_on:
      - alertmanager
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    # Not exposed publicly — access via Grafana or docker exec
    # Uncomment for local dev debugging:
    # ports:
    # "127.0.0.1:9090:9090"

  # Alertmanager (alert routing & dedup)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Grafana (dashboards & visualization)
  grafana:
    image: grafana/grafana-oss:10.4.1
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3002}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      # Disable public registration & anonymous access
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - default
      - monitoring
    # Localhost-only for local dev; remove or reverse-proxy in production
    ports:
      - "127.0.0.1:3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  uploads:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    driver: bridge
  monitoring:
    driver: bridge
    internal: true

