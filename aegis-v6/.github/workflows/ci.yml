# AEGIS v6 CI/CD Pipeline
# Comprehensive CI for Node.js backend, React frontend, and Python AI engine

name: AEGIS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend (Node.js/Express)
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aegis-v6/server
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/server/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript check
        run: npx tsc --noEmit
        
      - name: ESLint
        run: npm run lint --if-present
        
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: ./aegis-v6/server
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/server/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests with coverage
        run: npm test -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aegis_test
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

      - name: Backend coverage summary
        if: always()
        run: |
          echo '## 🧪 Backend Test Coverage' >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat coverage/text-summary.txt 2>/dev/null || npx jest --coverage --coverageReporters=text-summary 2>/dev/null || echo 'See coverage/ artifacts'
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # Frontend (React/Vite)
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aegis-v6/client
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/client/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript check
        run: npx tsc --noEmit
        
      - name: ESLint
        run: npm run lint --if-present
        
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: ./aegis-v6/client
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/client/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run unit tests with coverage
        run: npm test -- --run --coverage
        
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: ./aegis-v6/client
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/client/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_MAPBOX_TOKEN: pk.placeholder.for.ci

  # AI Engine (Python/FastAPI)
  ai-engine-lint:
    name: AI Engine Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aegis-v6/ai-engine
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: aegis-v6/ai-engine/requirements.txt
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt
          
      - name: Ruff lint
        run: ruff check app/ --ignore E501
        
      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports --no-error-summary || true
        
  ai-engine-test:
    name: AI Engine Tests
    runs-on: ubuntu-latest
    needs: ai-engine-lint
    defaults:
      run:
        working-directory: ./aegis-v6/ai-engine
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: aegis-v6/ai-engine/requirements.txt
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
          
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aegis_test

  # E2E Tests (Playwright)
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: ./aegis-v6/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aegis-v6/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: aegis-v6/client/playwright-report/
          retention-days: 7

  # Final Check (all jobs must pass)
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, ai-engine-test, e2e-tests]
    steps:
      - name: CI Passed
        run: echo "All CI checks passed!"
